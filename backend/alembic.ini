# alembic.ini
# -----------
# Configuración de Alembic para el proyecto Frotis-app.
# NOTA: La DATABASE_URL real se inyecta dinámicamente en alembic/env.py
# leyendo las variables de entorno del archivo .env de la raíz del proyecto.

[alembic]
# Ruta al directorio de scripts de migración (relativa a este archivo).
script_location = %(here)s/alembic

# Formato de nombre para los archivos de migración generados.
# Ejemplo: 20260508_1200-abc123_create_initial_tables.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Prepend al sys.path (el directorio backend/ ya lo agrega env.py).
prepend_sys_path = .

# Longitud máxima del "slug" en el nombre del archivo de migración.
truncate_slug_length = 40

# URL de conexión. Será SOBREESCRITA por env.py con la URL real del .env.
# No editar este valor manualmente; usar variables de entorno.
sqlalchemy.url = postgresql://user:frotis123@localhost:5432/frotis_db

# ---------------------------------------------------------------------------
# Configuración de logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

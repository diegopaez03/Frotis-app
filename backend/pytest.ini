[pytest]
# Directorio raíz donde pytest busca los tests
testpaths = app/tests

# Patrón de archivos de test
python_files = test_*.py *_test.py

# Patrón de funciones de test
python_functions = test_*

# Patrón de clases de test
python_classes = Test*

# Mostrar detalles de los tests que pasan y fallan
addopts = -v --tb=short

# Modo asyncio para pytest-asyncio (aunque los tests son sincrónicos)
asyncio_mode = auto
